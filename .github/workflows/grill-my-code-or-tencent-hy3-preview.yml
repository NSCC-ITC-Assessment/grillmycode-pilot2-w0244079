# A fully annotated workflow showing every available input.
# Inputs that don't apply to this scenario are commented out
# with an explanation of when they would be used instead.

name: GrillMyCode - OpenRouter - Tencent Hy3 Preview

on:
  workflow_dispatch:

jobs:
  question-generator:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to commit the output file back to the repo
      pull-requests: write # required to post the PR comment
      # models: read # required to call GitHub Models API
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history required for diff resolution

      - uses: NSCC-ITC-Assessment/GrillMyCode@main
        with:
          # ── Authentication ────────────────────────────────────────────────

          # GitHub token used for API access and as the GitHub Models credential.
          # The built-in token is sufficient for most setups; supply an instructor
          # PAT here if you need an account with a higher GitHub Models rate limit.
          github_token: ${{ secrets.GITHUB_TOKEN }}

          # ── AI Provider ───────────────────────────────────────────────────

          # Provider to use for question generation.
          # Supported values: github-models | openai | openrouter | azure-openai
          # Default if not supplied: "github-models" when GITHUB_TOKEN is provided.
          ai_provider: "openrouter"

          # Model identifier for the chosen provider.
          # GitHub Models: gpt-4o, gpt-4o-mini, Codestral-2501, Phi-4, mistral-medium-2505, cohere-command-a, etc.
          # OpenAI:        gpt-4o, gpt-4-turbo
          # Azure OpenAI:  your deployment name
          # OpenRouter:    depends on your configured providers and models
          ai_model: "tencent/hy3-preview"

          # API key for the provider. Leave empty when using github-models with
          # the built-in GITHUB_TOKEN. Required for openai and openrouter.
          # api_key: ${{ secrets.AI_API_KEY }}
          api_key: ${{ secrets.OPENROUTER }}

          # Full Azure OpenAI endpoint URL. Only required for azure-openai.
          # azure_endpoint: "https://my-resource.openai.azure.com/openai/deployments/my-deployment"

          # ── Question Generation ───────────────────────────────────────────

          # Number of comprehension questions to generate (1–50). Capped to 50.
          num_questions: "50"

          # Free-text context about the assignment or topic. Helps the AI produce
          # more relevant, targeted questions. Supports multi-line values.
          # additional_context: |
          #   Assignment 3 — Python list comprehensions and lambda functions.
          #   Focus questions on why the student made their design choices.

          # ── File Filtering ────────────────────────────────────────────────

          # Comma-separated globs for files to include. Leave empty to assess
          # all non-excluded files.
          # include_patterns: "*.py,*.js,src/**"

          # Comma-separated globs for files to exclude. Providing a value here
          # completely replaces the built-in default list (lock files, images,
          # build artefacts, etc.).
          # exclude_patterns: "node_modules/**,dist/**,**/*.min.js"

          # When true (default), .github/workflows/ files are excluded from the
          # diff. Set to "false" if the assignment involves writing workflow files
          # and you want those included in the assessment.
          exclude_workflow_files: "true"

          # When false (default), inline and block comments are stripped from the
          # submitted code before it is sent to the AI, ensuring questions focus
          # on the code logic rather than the student's annotations. Set to "true"
          # to preserve comments exactly as written.
          # keep_comments: "false"

          # ── Output & Delivery ─────────────────────────────────────────────

          # Basename of the assessment Markdown file. Always written to the
          # _assessment/ folder in the repository root and committed back.
          output_file: "grill-my-code-or-tencent-hy3-preview.md"

          # Post the assessment as a comment on the pull request.
          # Disable if you only want the output file committed to the repo.
          post_pr_comment: "true"

          # Create a GitHub Issue containing the assessment questions.
          # Each run produces a distinct, searchable issue. Not needed here
          # because the PR comment already surfaces the questions to the student.
          # post_issue: "false"

          # Create a GitHub Discussion containing the assessment questions.
          # Requires Discussions to be enabled on the repository.
          # post_discussion: "false"

          # Discussion category to post into. Must already exist in the repo's
          # Discussions settings. Only relevant when post_discussion is "true".
          # discussion_category: "Assessments"

          # ── Instructor repository ─────────────────────────────────────────

          # PAT with repo scope and permission to create repositories in the
          # same organisation as the student repositories. When provided, the
          # action writes a private instructor-only report (questions AND answers)
          # to a repository named {assignment-name}-grillmycode in the same org.
          # The repository is auto-created on first run if it does not exist.
          # The assignment name is resolved from the student repo's
          # template_repository (GitHub Classroom), falling back to the source
          # repo name for non-Classroom setups.
          # Leave empty (default) to disable instructor repository delivery.
          instructor_repo_token: ${{ secrets.INSTRUCTOR_REPO_TOKEN }}

          # ── Commit Range ──────────────────────────────────────────────────

          # Pin the diff base to the repository's very first commit so that
          # GitHub Classroom starter/template files are excluded. Set to "false"
          # to use the PR base branch SHA as the diff base instead, which is
          # useful for multi-commit PR workflows where the starter code was
          # already on the base branch.
          skip_initial_commit: "true"

          # Comma-separated author names or email substrings to skip. Consecutive
          # leading commits (immediately after the base SHA) whose author matches
          # any entry are excluded from the diff. Set to '' to disable entirely.
          skip_committers: "github-classroom[bot],github-actions[bot]"

          # Manually override the base and head commit SHAs. Both must be set
          # together. Auto-detected from the event context when not provided.
          # base_sha: ""
          # head_sha: ""